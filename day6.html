        function masterFxn(mF){
            let x= document.getElementById('val1').value;
            let y = document.getElementById('val2').value;
            if (mF=="summation"){
                document.getElementById('result').value = parseInt(x)+ parseInt(y);
            }
            else if (mF=="difference"){
                document.getElementById('result').value = parseInt(x)- parseInt(y);
            }
            else if (mF=="division"){
                 document.getElementById('result').value = parseInt(x)/ parseInt(y);
            }
            else if (mF=="product"){
               document.getElementById('result').value = parseInt(x)* parseInt(y);
            }
